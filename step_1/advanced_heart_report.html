            </div>
        </div>
        <div class="explanation">
            <strong>指標說明：</strong><br>
            • <strong>RMSSD (HRV)</strong>: 反映自主神經系統的活性。數值越高通常代表身體恢復能力越強、壓力適應力越好。<br>
            • <strong>RR 間期</strong>: 兩次心跳間的時間長度。平均 662ms 對應約 90 BPM。
        </div>
    </div>

        </div>
    </div>

        <h2>心率區間佔比 (BPM 分佈)</h2>
