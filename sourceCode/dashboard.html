<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 個人健康運動儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select, input {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .card .value {
            font-size: 1.4em;
            font-weight: bold;
            color: var(--primary-color);
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .full-width {
            grid-column: span 2;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>個人健康運動儀表板</h1>
            <div class="controls">
                <label for="range">時間範圍:</label>
                <select id="range" onchange="handleRangeChange()">
                    <option value="week">本週</option>
                    <option value="month">本月</option>
                    <option value="year" selected>2026 全年</option>
                    <option value="custom">自訂範圍</option>
                </select>
                <div id="custom-range" style="display:none;">
                    <input type="date" id="start-date"> 到 <input type="date" id="end-date">
                    <button onclick="updateDashboard()">更新</button>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3>總步數</h3>
                <div id="total-steps" class="value">0</div>
            </div>
            <div class="card">
                <h3>總距離 (km)</h3>
                <div id="total-distance" class="value">0</div>
            </div>
            <div class="card">
                <h3>總消耗 (kcal)</h3>
                <div id="total-calories" class="value">0</div>
            </div>
            <div class="card">
                <h3>平均心率</h3>
                <div id="avg-hr" class="value">0</div>
            </div>
            <div class="card">
                <h3>平均血氧</h3>
                <div id="avg-spo2" class="value">0</div>
            </div>
            <div class="card">
                <h3>平均壓力</h3>
                <div id="avg-stress" class="value">0</div>
            </div>
            <div class="card">
                <h3>平均睡眠</h3>
                <div id="avg-sleep" class="value">0</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container full-width">
                <canvas id="stepsChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="caloriesChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="hrChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="sleepChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="stressChart"></canvas>
            </div>
            <div class="chart-container full-width">
                <canvas id="sportPieChart"></canvas>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let charts = {};

        function initCharts() {
            const chartConfigs = {
                stepsChart: { type: 'line', label: '每日步數', color: '#4a90e2', title: '步數趨勢' },
                caloriesChart: { type: 'bar', label: '熱量消耗 (kcal)', color: '#50e3c2', title: '熱量消耗趨勢' },
                hrChart: { type: 'line', label: '平均心率', color: '#ff6384', title: '心率趨勢' },
                stressChart: { type: 'bar', label: '平均壓力', color: '#ffce56', title: '壓力趨勢' },
                sleepChart: { type: 'bar', label: '睡眠時長 (hr)', color: '#4bc0c0', title: '睡眠趨勢' }
            };

            for (const [id, config] of Object.entries(chartConfigs)) {
                const ctx = document.getElementById(id).getContext('2d');
                charts[id] = new Chart(ctx, {
                    type: config.type,
                    data: { labels: [], datasets: [{ label: config.label, data: [], borderColor: config.color, backgroundColor: config.color + '80', tension: 0.1 }] },
                    options: { responsive: true, plugins: { title: { display: true, text: config.title } } }
                });
            }

            const ctxPie = document.getElementById('sportPieChart').getContext('2d');
            charts.sportPieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '運動分類佔比' } } }
            });
            ctxPie.canvas.parentNode.style.height = '300px';
        }

        function handleRangeChange() {
            const range = document.getElementById('range').value;
            const customRangeDiv = document.getElementById('custom-range');
            customRangeDiv.style.display = range === 'custom' ? 'block' : 'none';
            if (range !== 'custom') {
                updateDashboard();
            }
        }

        function updateDashboard() {
            const range = document.getElementById('range').value;
            let filteredData = [];
            const today = new Date("2026-05-21");

            if (range === 'week') {
                const weekAgo = new Date(today);
                weekAgo.setDate(today.getDate() - 7);
                filteredData = dailyData.filter(d => new Date(d.date) >= weekAgo);
            } else if (range === 'month') {
                const monthAgo = new Date(today);
                monthAgo.setMonth(today.getMonth() - 1);
                filteredData = dailyData.filter(d => new Date(d.date) >= monthAgo);
            } else if (range === 'year') {
                filteredData = dailyData;
            } else if (range === 'custom') {
                const start = document.getElementById('start-date').value;
                const end = document.getElementById('end-date').value;
                if (start && end) {
                    filteredData = dailyData.filter(d => d.date >= start && d.date <= end);
                } else {
                    return;
                }
            }

            // Update Stats
            const count = filteredData.length || 1;
            const totalSteps = filteredData.reduce((sum, d) => sum + d.steps, 0);
            const totalDistance = filteredData.reduce((sum, d) => sum + d.distance, 0);
            const totalCalories = filteredData.reduce((sum, d) => sum + d.calories, 0);
            
            const avgHr = filteredData.filter(d => d.hr > 0).reduce((sum, d) => sum + d.hr, 0) / (filteredData.filter(d => d.hr > 0).length || 1);
            const avgSpo2 = filteredData.filter(d => d.spo2 > 0).reduce((sum, d) => sum + d.spo2, 0) / (filteredData.filter(d => d.spo2 > 0).length || 1);
            const avgStress = filteredData.filter(d => d.stress > 0).reduce((sum, d) => sum + d.stress, 0) / (filteredData.filter(d => d.stress > 0).length || 1);
            const avgSleep = filteredData.reduce((sum, d) => sum + d.sleep, 0) / count;

            document.getElementById('total-steps').innerText = Math.round(totalSteps).toLocaleString();
            document.getElementById('total-distance').innerText = totalDistance.toFixed(2);
            document.getElementById('total-calories').innerText = Math.round(totalCalories).toLocaleString();
            
            document.getElementById('avg-hr').innerText = Math.round(avgHr);
            document.getElementById('avg-spo2').innerText = Math.round(avgSpo2) + '%';
            document.getElementById('avg-stress').innerText = Math.round(avgStress);
            document.getElementById('avg-sleep').innerText = avgSleep.toFixed(1) + 'h';

            // Update Charts
            const labels = filteredData.map(d => d.date);
            
            charts.stepsChart.data.labels = labels;
            charts.stepsChart.data.datasets[0].data = filteredData.map(d => d.steps);
            charts.stepsChart.update();

            charts.caloriesChart.data.labels = labels;
            charts.caloriesChart.data.datasets[0].data = filteredData.map(d => d.calories);
            charts.caloriesChart.update();

            charts.hrChart.data.labels = labels;
            charts.hrChart.data.datasets[0].data = filteredData.map(d => d.hr);
            charts.hrChart.update();

            charts.stressChart.data.labels = labels;
            charts.stressChart.data.datasets[0].data = filteredData.map(d => d.stress);
            charts.stressChart.update();

            charts.sleepChart.data.labels = labels;
            charts.sleepChart.data.datasets[0].data = filteredData.map(d => d.sleep);
            charts.sleepChart.update();

            charts.sportPieChart.data.labels = Object.keys(sportData);
            charts.sportPieChart.data.datasets[0].data = Object.values(sportData);
            charts.sportPieChart.update();
        }

        window.onload = () => {
            initCharts();
            updateDashboard();
        };
    </script>
</body>
</html>
